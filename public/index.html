<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Электронный дневник</title>
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div class="app-bg" aria-hidden="true"></div>

    <div id="picker" class="picker" hidden>
      <div class="picker__backdrop"></div>
      <div class="picker__sheet" role="dialog" aria-label="Выбор ученика">
        <div class="picker__title">Кто учится?</div>
        <ul id="picker-list" class="picker__list"></ul>
        <button type="button" class="picker__close" id="picker-close">Отмена</button>
      </div>
    </div>

    <header class="topbar">
      <button type="button" class="topbar__who" id="open-picker">
        <span class="topbar__name" id="hdr-name">—</span>
        <span class="topbar__class" id="hdr-class">—</span>
      </button>
    </header>

    <main class="main">
      <section id="view-diary" class="view" data-view="diary">
        <div class="diary-wrap">
          <button type="button" class="diary-nav-btn" id="diary-prev" aria-label="Предыдущий день">
            ‹
          </button>
          <div class="card card--paper diary-card" id="diary-card">
            <div class="card-head">
              <div class="cal-ico" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="5" width="18" height="16" rx="2" stroke="white" stroke-width="1.6" />
                  <path d="M8 3v4M16 3v4M3 11h18" stroke="white" stroke-width="1.6" />
                </svg>
              </div>
              <div class="date-ribbon" id="diary-date-banner">
                <span class="date-ribbon__num" id="diary-day-num">—</span>
                <div class="date-ribbon__rest">
                  <span id="diary-weekday">—</span>
                  <span id="diary-month-y">—</span>
                </div>
              </div>
            </div>
            <p class="swipe-hint">
              Кнопки по бокам или свайп: влево — следующий день, вправо — предыдущий
            </p>
            <div id="diary-lessons" class="lessons"></div>
          </div>
          <button type="button" class="diary-nav-btn" id="diary-next" aria-label="Следующий день">
            ›
          </button>
        </div>
      </section>

      <section id="view-performance" class="view view--hidden" data-view="performance">
        <div id="perf-chart" class="card card--paper">
          <div class="card-head">
            <div class="cal-ico" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="16" rx="2" stroke="white" stroke-width="1.6" />
                <path d="M8 3v4M16 3v4M3 11h18" stroke="white" stroke-width="1.6" />
              </svg>
            </div>
            <div class="date-ribbon date-ribbon--wide" id="perf-date-banner">
              <span class="date-ribbon__line" id="perf-date-line">—</span>
            </div>
          </div>
          <div class="trimester" id="perf-trimester">—</div>
          <div class="legend">
            <span><i class="lg lg--stu"></i> ученик</span>
            <span><i class="lg lg--cls"></i> класс</span>
            <span><i class="lg lg--par"></i> параллель</span>
          </div>
          <div id="perf-rows" class="perf-rows"></div>
        </div>

        <div id="perf-grades" class="card card--paper view--hidden">
          <div class="card-head">
            <div class="cal-ico" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="16" rx="2" stroke="white" stroke-width="1.6" />
                <path d="M8 3v4M16 3v4M3 11h18" stroke="white" stroke-width="1.6" />
              </svg>
            </div>
            <div class="date-ribbon date-ribbon--wide">
              <span class="date-ribbon__line" id="grades-banner-date">—</span>
            </div>
          </div>
          <div class="grades-title" id="grades-subject-title">Все предметы</div>
          <button type="button" class="back-link" id="grades-back">← К диаграммам</button>
          <div id="grades-list" class="grades-list"></div>
        </div>
      </section>

      <section id="view-finals" class="view view--hidden" data-view="finals">
        <div class="card card--paper">
          <div class="card-head">
            <div class="cal-ico" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="16" rx="2" stroke="white" stroke-width="1.6" />
                <path d="M8 3v4M16 3v4M3 11h18" stroke="white" stroke-width="1.6" />
              </svg>
            </div>
            <div class="date-ribbon date-ribbon--year" id="finals-year-ribbon">
              <span id="finals-year">—</span>
            </div>
          </div>
          <div class="finals-head">
            <span class="finals-head__subj">Предмет</span>
            <div class="finals-head__tabs">
              <span>1T</span><span>2T</span><span>3T</span><span>Г</span>
            </div>
          </div>
          <div id="finals-rows" class="finals-rows"></div>
        </div>
      </section>

      <section id="view-meetings" class="view view--hidden" data-view="meetings">
        <div class="card card--paper card--center">
          <p class="placeholder-msg">
            Пока в ближайшее время собраний нет
          </p>
        </div>
      </section>
    </main>

    <nav class="bottomnav" aria-label="Разделы">
      <button type="button" class="bn-item is-active" data-tab="diary">
        <span class="bn-ico bn-ico--book" aria-hidden="true"></span>
        <span>Дневник</span>
      </button>
      <button type="button" class="bn-item" data-tab="performance">
        <span class="bn-ico bn-ico--chart" aria-hidden="true"></span>
        <span>Успеваемость</span>
      </button>
      <button type="button" class="bn-item" data-tab="meetings">
        <span class="bn-ico bn-ico--people" aria-hidden="true"></span>
        <span>Собрание</span>
      </button>
      <button type="button" class="bn-item" data-tab="finals">
        <span class="bn-ico bn-ico--list" aria-hidden="true"></span>
        <span>Итоговые</span>
      </button>
    </nav>

    <script src="/js/app.js" defer></script>
  </body>
</html>
